spring.application.name=resume

server.port=8081

# Database configuration


#DATABASE
spring.datasource.url=jdbc:postgresql://localhost:5432/RESUME_DB
spring.datasource.username=prince
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#JPA / Hibernate
spring.security.enabled=false
spring.flyway.enabled=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE 


# JWT Secret Key
jwt.secret=your-super-secret-key-must-be-at-least-32-chars-long
jwt.accessTokenExpiration=3600000
jwt.refreshTokenExpiration=604800000

# Swagger UI path
springdoc.swagger-ui.path=/swagger-ui.html

# API docs path
springdoc.api-docs.path=/v3/api-docs

# Always show swagger (even in prod ? disable in prod if needed)
springdoc.swagger-ui.enabled=true


